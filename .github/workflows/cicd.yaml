name: cloudforge
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js (if needed)
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Run a simple command
        run: echo "CI pipeline for CloudForge"

      - name: Install dependencies
        run: npm install

      - name: docker login
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Docker build
        run: docker build -t gauravsaini2311/cloudforge .

      - name: Docker push
        run: docker push gauravsaini2311/cloudforge
    
      - name: terraform init
        run: terraform init
    
      - name: terraform plan
        run: terraform plan

      - name: terraform apply
        run: terraform apply -auto-approve 

      - name: ec2 login
        run: |
          ssh -o StrictHostKeyChecking=no -i ${{ secrets.EC2_KEY }} ubuntu@${{ secrets.EC2_PUBLIC_IP }} << 'EOF'
            docker pull gauravsaini2311/cloudforge
            docker run -d -p 80:80 gauravsaini2311/cloudforge
          EOF

        

